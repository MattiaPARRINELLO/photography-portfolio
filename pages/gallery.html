<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- META_PLACEHOLDER_START -->
    <title>{{DYNAMIC_TITLE}}</title>
    <meta name="description" content="{{DYNAMIC_DESCRIPTION}}" />
    <!-- META_PLACEHOLDER_END -->
    <link rel="icon" type="image/svg+xml" href="../dist/assets/Logo_MP.svg" />
    <link rel="stylesheet" href="../dist/css/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Signika:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <style>
      .masonry {
        column-count: 4;
        column-gap: 10px;
      }
      @media (max-width: 1440px) { .masonry { column-count: 3; } }
      @media (max-width: 768px)  { .masonry { column-count: 2; } }
      @media (max-width: 480px)  { .masonry { column-count: 2; } }
      .masonry > a {
        display: block;
        margin: 0 0 10px;
        break-inside: avoid;
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }
      .masonry img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 6px;
        transition: transform 0.6s cubic-bezier(0.22, 0.8, 0.22, 1);
      }
      .masonry a:hover img { transform: scale(1.03); }

      .gallery-hero {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        margin-bottom: 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }
      .gallery-hero .cover {
        width: 100%;
        max-height: 420px;
        object-fit: cover;
        display: block;
      }
      .gallery-hero .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 60%,
          rgba(0, 0, 0, 0) 100%
        );
      }
      .gallery-hero .hero-content {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 2rem 2.5rem;
        color: white;
      }
      .gallery-hero h1 {
        font-family: "Signika", sans-serif;
        font-weight: 700;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        margin: 0 0 0.4rem;
        line-height: 1.1;
      }
      .gallery-hero .meta {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.88);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: "Signika", sans-serif;
        color: inherit;
        text-decoration: none;
        opacity: 0.7;
        transition: opacity 0.2s ease;
        margin-bottom: 1rem;
      }
      .back-link:hover { opacity: 1; }
    </style>
  </head>

  <body
    class="dark:bg-black bg-white min-h-screen text-black dark:text-white px-5 md:px-20 opacity-0 animate-fade-in transition duration-500"
  >
    <!-- Navbar -->
    <header class="flex w-full overflow-hidden pt-10 pb-1">
      <nav id="nav" x-data="{ open: false }" role="navigation" class="w-full">
        <div class="container mx-auto flex flex-wrap items-center md:flex-no-wrap">
          <div class="mr-4 md:mr-8">
            <a href="/" class="text-2xl font-signika font-bold">MATTIA PARRINELLO</a>
          </div>
          <div class="ml-auto md:hidden flex items-center justify-start">
            <button
              onclick="menuToggle()"
              @click="open = !open"
              class="tap-highlight-transparent text-black dark:text-white w-5 h-5 relative focus:outline-none"
            >
              <span class="sr-only">Ouvrir le menu principal</span>
              <div class="block w-5 absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2">
                <span aria-hidden="true" class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out" :class="{'rotate-45': open,' -translate-y-1.5': !open }"></span>
                <span aria-hidden="true" class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out" :class="{'opacity-0': open } "></span>
                <span aria-hidden="true" class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out" :class="{'-rotate-45': open, ' translate-y-1.5': !open}"></span>
              </div>
            </button>
          </div>
          <div id="menu" class="w-full h-0 transition-all ease-out duration-500 md:transition-none md:w-auto md:flex-grow md:flex md:items-center">
            <ul id="ulMenu" class="flex flex-col duration-300 ease-out md:space-x-5 sm:transition-none mt-5 md:flex-row md:items-center md:ml-auto md:mt-0 md:pt-0 md:border-0">
              <li class="group transition duration-300">
                <a href="/portfolio" class="font-signika text-2xl tap-highlight-transparent">PORTFOLIO
                  <span class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
                </a>
              </li>
              <li class="group transition duration-300">
                <a href="/galeries" class="font-signika text-2xl tap-highlight-transparent">GALERIES
                  <span class="hidden md:block h-0.5 bg-black dark:bg-white"></span>
                </a>
              </li>
              <li class="group transition duration-300">
                <a href="/a-propos" class="font-signika text-2xl tap-highlight-transparent">À PROPOS
                  <span class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
                </a>
              </li>
              <li class="group transition duration-300">
                <a href="/contact" class="font-signika text-2xl tap-highlight-transparent">CONTACT
                  <span class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mx-auto pt-10 pb-16">
      <a href="/galeries" class="back-link">← Toutes les galeries</a>

      <!-- GALLERY_HERO_PLACEHOLDER -->
      <!-- GALLERY_DESCRIPTION_PLACEHOLDER -->
      <!-- GALLERY_PHOTOS_PLACEHOLDER -->
    </main>

    <footer>
      <div class="max-w-screen-xl py-16 mx-auto">
        <div class="grid grid-cols-1 gap-8 text-center mx-auto">
          <div>
            <p class="font-signika"><b>MATTIA PARRINELLO</b></p>
            <p class="mt-2 text-xs text-gray-500 dark:text-gray-400">
              <a href="/mentions-legales" class="hover:underline">Mentions légales</a>
            </p>
            <p class="mt-3 text-xs text-gray-400 dark:text-gray-500">
              Mattia Parrinello - Photographe de concert à Paris · Disponible en
              Île-de-France et partout en France
            </p>
          </div>
        </div>
      </div>
    </footer>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (window.Fancybox) {
          Fancybox.bind('[data-fancybox="gallery"]', {});
        }
      });
    </script>
    <script defer src="/dist/js/fade_in.js"></script>
    <script defer src="/dist/js/menu.js"></script>
  </body>
</html>
