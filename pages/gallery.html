<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css"
    />
    <style>
      .masonry {
        column-count: 4;
        column-gap: 10px;
      }
      @media (max-width: 1440px) {
        .masonry {
          column-count: 3;
        }
      }
      @media (max-width: 768px) {
        .masonry {
          column-count: 2;
        }
      }
      @media (max-width: 480px) {
        .masonry {
          column-count: 2;
        }
      }
      .masonry > a {
        display: block;
        margin: 0 0 10px;
        break-inside: avoid;
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }
      .masonry img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 6px;
        transition: transform 0.6s cubic-bezier(0.22, 0.8, 0.22, 1);
      }
      .masonry a:hover img {
        transform: scale(1.03);
      }

      .gallery-hero {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        margin-bottom: 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }
      .gallery-hero .cover {
        width: 100%;
        max-height: 420px;
        object-fit: cover;
        display: block;
      }
      .gallery-hero .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 60%,
          rgba(0, 0, 0, 0) 100%
        );
      }
      .gallery-hero .hero-content {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 2rem 2.5rem;
        color: white;
      }
      .gallery-hero h1 {
        font-family: "Signika", sans-serif;
        font-weight: 700;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        margin: 0 0 0.4rem;
        line-height: 1.1;
      }
      .gallery-hero .meta {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.88);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: "Signika", sans-serif;
        color: inherit;
        text-decoration: none;
        opacity: 0.7;
        transition: opacity 0.2s ease;
        margin-bottom: 1rem;
      }
      .back-link:hover {
        opacity: 1;
      }

      .gallery-intro-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(250px, 1fr);
        align-items: start;
        gap: clamp(1rem, 3vw, 2.2rem);
        margin-bottom: clamp(2rem, 5vw, 3.2rem);
      }

      .gallery-description-panel {
        max-width: 68ch;
      }

      .gallery-description-text {
        margin: 0;
        font-size: clamp(1rem, 1.4vw, 1.08rem);
        line-height: 1.8;
        color: rgba(31, 41, 55, 0.9);
      }

      .artist-links-panel {
        border-radius: 14px;
        padding: clamp(0.9rem, 1.7vw, 1.1rem);
        border: 1px solid rgba(15, 23, 42, 0.14);
        background: rgba(255, 255, 255, 0.62);
      }

      .artist-links-head {
        display: flex;
        flex-direction: column;
        gap: 0.28rem;
        margin-bottom: 0.95rem;
      }

      .artist-links-kicker {
        margin: 0;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
        color: rgba(30, 41, 59, 0.6);
      }

      .artist-links-title {
        margin: 0;
        font-family: "Signika", sans-serif;
        font-weight: 700;
        font-size: clamp(1.06rem, 2vw, 1.28rem);
      }

      .artist-link-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 0.9rem;
      }

      .artist-link-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.58rem;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.19);
        background: rgba(255, 255, 255, 0.86);
        color: inherit;
        text-decoration: none;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          background 0.15s ease;
      }

      .artist-link-chip:hover {
        transform: translateY(-1px);
        border-color: rgba(15, 23, 42, 0.32);
        background: rgba(255, 255, 255, 1);
      }

      .artist-link-chip:focus-visible {
        outline: 2px solid rgba(15, 23, 42, 0.85);
        outline-offset: 2px;
      }

      .artist-link-icon {
        width: 1.5rem;
        height: 1.5rem;
        flex: 0 0 1.5rem;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
      }

      .artist-platform-svg {
        width: 0.8rem;
        height: 0.8rem;
      }

      .artist-link-label {
        font-family: "Signika", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        line-height: 1;
      }

      .artist-link-chip[data-platform="instagram"] .artist-link-icon {
        background: #e1306c;
      }

      .artist-link-chip[data-platform="deezer"] .artist-link-icon {
        background: #ff005d;
      }

      .artist-link-chip[data-platform="spotify"] .artist-link-icon {
        background: #1db954;
      }

      .gallery-photos-shell {
        margin-top: 0;
      }

      .gallery-divider-grid {
        height: clamp(20px, 3vw, 32px);
        margin-bottom: clamp(1rem, 2vw, 1.5rem);
        background: none;
        mask-image: none;
        pointer-events: none;
      }

      @media (max-width: 900px) {
        .gallery-intro-grid {
          grid-template-columns: 1fr;
          gap: 1rem;
          margin-bottom: clamp(1.8rem, 4vw, 2.3rem);
        }

        .gallery-description-panel {
          max-width: none;
        }
      }

      @media (max-width: 520px) {
        .artist-link-chip {
          padding: 0.48rem 0.74rem;
        }
      }

      @media (prefers-color-scheme: dark) {
        .artist-links-panel {
          background: rgba(2, 6, 23, 0.74);
          border-color: rgba(148, 163, 184, 0.36);
        }

        .gallery-description-text {
          color: rgba(226, 232, 240, 0.9);
        }

        .artist-links-kicker {
          color: rgba(203, 213, 225, 0.78);
        }

        .artist-link-chip {
          border-color: rgba(148, 163, 184, 0.42);
          background: rgba(15, 23, 42, 0.72);
        }

        .artist-link-chip:hover {
          border-color: rgba(191, 219, 254, 0.74);
          background: rgba(15, 23, 42, 0.9);
        }

        .gallery-divider-grid {
          background: none;
          mask-image: none;
        }
      }
    </style>
  </head>

  <body
    class="dark:bg-black bg-white min-h-screen text-black dark:text-white px-5 md:px-20 opacity-0 animate-fade-in transition duration-500"
  >
    <!-- Navbar -->
    <header class="flex w-full overflow-hidden pt-10 pb-1">
      <nav id="nav" x-data="{ open: false }" role="navigation" class="w-full">
        <div

              >MATTIA PARRINELLO</a

          <div class="ml-auto md:hidden flex items-center justify-start">
            <button
              onclick="menuToggle()"
              @click="open = !open"
              class="tap-highlight-transparent text-black dark:text-white w-5 h-5 relative focus:outline-none"
            >
              <span class="sr-only">Ouvrir le menu principal</span>
              <div
                class="block w-5 absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2"
              >
                <span
                  aria-hidden="true"
                  class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out"
                  :class="{'rotate-45': open,' -translate-y-1.5': !open }"
                ></span>
                <span
                  aria-hidden="true"
                  class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out"
                  :class="{'opacity-0': open } "
                ></span>
                <span
                  aria-hidden="true"
                  class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out"
                  :class="{'-rotate-45': open, ' translate-y-1.5': !open}"
                ></span>
              </div>
            </button>
          </div>
          <div
            id="menu"
            class="w-full h-0 transition-all ease-out duration-500 md:transition-none md:w-auto md:flex-grow md:flex md:items-center"
          >
            <ul
              id="ulMenu"
              class="flex flex-col duration-300 ease-out md:space-x-5 sm:transition-none mt-5 md:flex-row md:items-center md:ml-auto md:mt-0 md:pt-0 md:border-0"
            >
              <li class="group transition duration-300">
                <a
                  href="/portfolio"
                  class="font-signika text-2xl tap-highlight-transparent"
                  >PORTFOLIO
                  <span
                    class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"
                  ></span>
                </a>
              </li>
              <li class="group transition duration-300">
                <a
                  href="/galeries"
                  class="font-signika text-2xl tap-highlight-transparent"
                  >GALERIES
                  <span
                    class="hidden md:block h-0.5 bg-black dark:bg-white"
                  ></span>
                </a>
              </li>
              <li class="group transition duration-300">
                <a
                  href="/a-propos"
                  class="font-signika text-2xl tap-highlight-transparent"
                  >À PROPOS
                  <span
                    class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"
                  ></span>
                </a>
              </li>
              <li class="group transition duration-300">
                <a
                  href="/contact"
                  class="font-signika text-2xl tap-highlight-transparent"
                  >CONTACT
                  <span
                    class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"
                  ></span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mx-auto pt-10 pb-16">
      <a href="/galeries" class="back-link">← Toutes les galeries</a>

      <div class="max-w-screen-xl py-16 mx-auto">
        <div class="grid grid-cols-1 gap-8 text-center mx-auto">
          <div>
            <p class="font-signika"><b>MATTIA PARRINELLO</b></p>
            <p class="mt-2 text-xs text-gray-500 dark:text-gray-400">
              <a href="/mentions-legales" class="hover:underline"
                >Mentions légales</a

            <p class="mt-3 text-xs text-gray-400 dark:text-gray-500">
              Mattia Parrinello - Photographe de concert à Paris · Disponible en

      document.addEventListener("DOMContentLoaded", () => {
        if (window.Fancybox) {
          Fancybox.bind('[data-fancybox="gallery"]', {});

    <script defer src="/dist/js/fade_in.js"></script>
