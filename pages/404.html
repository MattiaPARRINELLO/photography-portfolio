<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>404 — Page introuvable</title>
    <meta name="robots" content="noindex, follow" />
    <style>
      :root{--bg:#ffffff;--fg:#111111}
      @media(prefers-color-scheme:dark){:root{--bg:#0b0b0b;--fg:#f7f7f7}}
      html,body{height:100%;margin:0}
      body{background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;display:flex;align-items:center;justify-content:center}
      .wrap{padding:24px;text-align:center;max-width:720px}
      .code{font-weight:700;font-size:clamp(3rem,10vw,6rem);margin:0}
      h1{margin:.4rem 0 .6rem;font-size:clamp(1.1rem,3vw,1.6rem);font-weight:600}
      p{margin:0;color:rgba(17,17,17,0.72)}
      @media(prefers-color-scheme:dark){p{color:rgba(247,247,247,0.72)}}
      .actions{margin-top:18px;display:flex;gap:10px;justify-content:center}
      a{padding:8px 14px;border-radius:999px;text-decoration:none;font-weight:600;border:1px solid currentColor;color:inherit}
      .primary{background:var(--fg);color:var(--bg);border-color:transparent}
      .secondary{background:transparent}
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="code">404</p>
      <h1>Page introuvable</h1>
      <p>Le lien demandé ne mène nulle part. Retournez au portfolio ou contacte-moi.</p>
      <div class="actions">
        <a class="primary" href="/">Portfolio</a>
        <a class="secondary" href="/contact">Contact</a>
      </div>
    </div>
  </body>
</html>
