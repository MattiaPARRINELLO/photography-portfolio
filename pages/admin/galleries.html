<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Galeries - Administration</title>
    <link rel="icon" type="image/svg+xml" href="../../dist/assets/Logo_MP.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface-hover: #222;
        --border: #2a2a2a;
        --text: #e5e5e5;
        --text-muted: #888;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #dc2626;
        --radius: 8px;
      }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
      }

      .hidden { display: none !important; }

      .header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(15,15,15,0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 1.25rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header-title { font-size: 0.95rem; font-weight: 600; }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 0.9rem;
        border: none;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        color: #fff;
      }

      .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

      .btn-primary { background: var(--accent); }
      .btn-primary:hover { background: var(--accent-hover); }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

      .btn-danger-solid { background: var(--danger); }
      .btn-danger-solid:hover { background: #b91c1c; }

      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem 1.25rem 3rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
      }

      .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .card-header .card-title { margin-bottom: 0; }

      label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      input[type="text"],
      input[type="url"],
      input[type="date"],
      input[type="file"],
      select,
      textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 0.85rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus, textarea:focus { border-color: var(--accent); }
      ::placeholder { color: #555; }
      textarea { resize: vertical; min-height: 60px; }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .form-full { margin-bottom: 0.75rem; }

      .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }

      /* Photo picker */
      .photo-picker {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.5rem;
        max-height: 400px;
        overflow-y: auto;
        padding: 0.5rem;
        background: var(--bg);
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }

      .photo-thumb {
        position: relative;
        aspect-ratio: 1 / 1;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 0.15s;
      }

      .photo-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .photo-thumb.selected {
        border-color: var(--accent);
      }

      .photo-thumb .badge {
        position: absolute;
        top: 3px;
        left: 3px;
        background: var(--accent);
        color: white;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 3px;
      }

      .photo-thumb .cover-star {
        position: absolute;
        top: 3px;
        right: 3px;
        background: rgba(0,0,0,0.7);
        color: #fbbf24;
        font-size: 12px;
        width: 20px;
        height: 20px;
        display: none;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        z-index: 2;
        cursor: pointer;
      }

      .photo-thumb.selected .cover-star { display: flex; }
      .photo-thumb.is-cover .cover-star { background: rgba(0,0,0,0.9); }

      .picker-hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      /* Gallery list */
      .gallery-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        transition: border-color 0.15s;
      }

      .gallery-card:hover { border-color: #444; }

      .gallery-card img {
        width: 100px;
        height: 70px;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .gallery-card-placeholder {
        width: 100px;
        height: 70px;
        border-radius: 6px;
        background: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .gallery-card-info { flex: 1; min-width: 0; }

      .gallery-card-title {
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 0.15rem;
      }

      .gallery-badge {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 600;
        padding: 1px 5px;
        border-radius: 3px;
        margin-left: 0.4rem;
        vertical-align: middle;
      }

      .gallery-badge.published { background: rgba(34,197,94,0.15); color: #4ade80; }
      .gallery-badge.draft { background: rgba(255,255,255,0.08); color: var(--text-muted); }

      .gallery-card-meta {
        font-size: 0.75rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .gallery-card-actions {
        display: flex;
        gap: 0.35rem;
        flex-shrink: 0;
      }

      .gallery-card-actions .btn { padding: 0.4rem 0.6rem; font-size: 0.8rem; }

      /* Checkbox */
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
      }

      .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; }

      /* Form footer */
      .form-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 0.75rem;
      }

      /* Upload progress */
      .upload-progress { display: none; margin-top: 0.5rem; }
      .upload-progress.active { display: block; }

      .progress-bar-bg {
        height: 6px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 3px;
        transition: width 0.15s;
        width: 0%;
      }

      .progress-text {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
        display: flex;
        justify-content: space-between;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        padding: 0.6rem 1rem;
        border-radius: var(--radius);
        background: #16a34a;
        color: white;
        font-weight: 500;
        font-size: 0.85rem;
        z-index: 100;
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s ease;
      }

      .toast.show { transform: translateY(0); opacity: 1; }
      .toast.error { background: var(--danger); }

      .empty-state {
        text-align: center;
        padding: 2rem 0;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      @media (max-width: 640px) {
        .form-grid, .links-grid { grid-template-columns: 1fr; }
        .gallery-card { flex-direction: column; align-items: flex-start; }
        .gallery-card img, .gallery-card-placeholder { width: 100%; height: 120px; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <span class="header-title">Galeries</span>
        <a href="/admin" class="btn btn-ghost">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          <span>Retour</span>
        </a>
      </div>
    </header>

    <main class="main">
      <!-- Create / Edit form -->
      <div class="card">
        <div class="card-header">
          <div class="card-title" id="form-title">Nouvelle galerie</div>
          <button id="cancel-edit-btn" type="button" class="btn btn-ghost hidden">Annuler</button>
        </div>

        <form id="gallery-form">
          <input type="hidden" id="gallery-id" />

          <div class="form-grid">
            <div>
              <label for="g-title">Titre *</label>
              <input type="text" id="g-title" name="title" required placeholder="Jok'air a La Cigale" />
            </div>
            <div>
              <label for="g-artist">Artiste</label>
              <input type="text" id="g-artist" name="artist" placeholder="Jok'air" />
            </div>
            <div>
              <label for="g-venue">Lieu / salle</label>
              <input type="text" id="g-venue" name="venue" placeholder="La Cigale, Paris" />
            </div>
            <div>
              <label for="g-date">Date</label>
              <input type="date" id="g-date" name="date" />
            </div>
          </div>

          <div class="form-full">
            <label for="g-description">Description</label>
            <textarea id="g-description" name="description" placeholder="Quelques mots sur le concert..."></textarea>
          </div>

          <div class="form-full">
            <label>Liens artiste (optionnel)</label>
            <div class="links-grid">
              <input type="url" id="g-artist-instagram" name="artistInstagram" placeholder="Instagram URL" />
              <input type="url" id="g-artist-deezer" name="artistDeezer" placeholder="Deezer URL" />
              <input type="url" id="g-artist-spotify" name="artistSpotify" placeholder="Spotify URL" />
            </div>
          </div>

          <div class="form-full">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem;">
              <label style="margin-bottom:0;">Photos <span id="selected-count" style="color:var(--text-muted);">0 selectionnee(s)</span></label>
              <span class="picker-hint">Clic = selectionner / Etoile = couverture</span>
            </div>
            <div style="margin-bottom:0.5rem;">
              <input id="upload-input" name="uploadedPhotos" type="file" multiple accept="image/*" />
              <div id="upload-list" style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem;"></div>
              <div id="upload-progress" class="upload-progress" aria-live="polite">
                <div class="progress-bar-bg"><div id="upload-progress-bar" class="progress-bar-fill"></div></div>
                <div class="progress-text">
                  <span id="upload-progress-label">Upload des photos...</span>
                  <span id="upload-progress-percent">0%</span>
                </div>
              </div>
            </div>
            <div id="photo-picker" class="photo-picker">
              <div style="grid-column:1/-1;text-align:center;padding:2rem 0;color:var(--text-muted);">Chargement des photos...</div>
            </div>
          </div>

          <div class="form-footer">
            <label class="checkbox-row">
              <input type="checkbox" id="g-published" name="published" checked />
              Publiee (visible sur le site)
            </label>
            <button type="submit" class="btn btn-primary">
              <span id="submit-label">Creer la galerie</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Gallery list -->
      <div class="card">
        <div class="card-title">Galeries existantes</div>
        <div id="galleries-list">
          <div class="empty-state">Chargement...</div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
      const form = document.getElementById("gallery-form");
      const idInput = document.getElementById("gallery-id");
      const titleInput = document.getElementById("g-title");
      const artistInput = document.getElementById("g-artist");
      const venueInput = document.getElementById("g-venue");
      const dateInput = document.getElementById("g-date");
      const descInput = document.getElementById("g-description");
      const artistInstagramInput = document.getElementById("g-artist-instagram");
      const artistDeezerInput = document.getElementById("g-artist-deezer");
      const artistSpotifyInput = document.getElementById("g-artist-spotify");
      const pubInput = document.getElementById("g-published");
      const submitLabel = document.getElementById("submit-label");
      const formTitle = document.getElementById("form-title");
      const cancelBtn = document.getElementById("cancel-edit-btn");
      const picker = document.getElementById("photo-picker");
      const uploadInput = document.getElementById("upload-input");
      const uploadList = document.getElementById("upload-list");
      const uploadProgress = document.getElementById("upload-progress");
      const uploadProgressBar = document.getElementById("upload-progress-bar");
      const uploadProgressPercent = document.getElementById("upload-progress-percent");
      const uploadProgressLabel = document.getElementById("upload-progress-label");
      const listEl = document.getElementById("galleries-list");
      const selectedCountEl = document.getElementById("selected-count");
      const toastEl = document.getElementById("toast");
      const submitBtn = form.querySelector('button[type="submit"]');

      let allPhotos = [];
      let selectedPhotos = [];
      let coverFilename = null;
      let editingId = null;

      function toast(msg, type = "success") {
        toastEl.textContent = msg;
        toastEl.className = "toast show" + (type === "error" ? " error" : "");
        setTimeout(() => { toastEl.className = "toast" + (type === "error" ? " error" : ""); }, 2500);
      }

      function normalizeCoverSelection() {
        if (selectedPhotos.length === 0) { coverFilename = null; return; }
        if (!coverFilename || !selectedPhotos.includes(coverFilename)) coverFilename = selectedPhotos[0];
      }

      function setUploadProgress(percent, label = null) {
        const safe = Math.max(0, Math.min(100, Number(percent) || 0));
        uploadProgress.classList.add("active");
        uploadProgressBar.style.width = `${safe}%`;
        uploadProgressPercent.textContent = `${safe}%`;
        if (label) uploadProgressLabel.textContent = label;
      }

      function resetUploadProgress() {
        uploadProgress.classList.remove("active");
        uploadProgressBar.style.width = "0%";
        uploadProgressPercent.textContent = "0%";
        uploadProgressLabel.textContent = "Upload des photos...";
      }

      function setSubmittingState(isSubmitting) {
        submitBtn.disabled = isSubmitting;
        cancelBtn.disabled = isSubmitting;
      }

      function uploadSinglePhoto(file) {
        return new Promise((resolve, reject) => {
          const fd = new FormData();
          fd.append("photos", file);
          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/admin/upload");
          xhr.responseType = "json";
          xhr.timeout = 5 * 60 * 1000;
          xhr.onload = () => {
            let data = xhr.response;
            if (!data) { try { data = JSON.parse(xhr.responseText || "{}"); } catch (_e) { data = {}; } }
            if (xhr.status >= 200 && xhr.status < 300) { resolve(data); return; }
            reject(new Error((data && data.error) || "Erreur upload"));
          };
          xhr.onerror = () => reject(new Error("Erreur reseau"));
          xhr.ontimeout = () => reject(new Error("Timeout"));
          xhr.send(fd);
        });
      }

      function sendFormWithoutFiles(url, method, formData) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open(method, url, true);
          xhr.responseType = "json";
          xhr.timeout = 30 * 1000;
          xhr.onload = () => {
            let data = xhr.response;
            if (!data) { try { data = JSON.parse(xhr.responseText || "{}"); } catch (_e) { data = {}; } }
            if (xhr.status >= 200 && xhr.status < 300) { resolve(data); return; }
            reject(new Error((data && data.error) || "Erreur sauvegarde"));
          };
          xhr.onerror = () => reject(new Error("Erreur reseau"));
          xhr.ontimeout = () => reject(new Error("Timeout"));
          xhr.send(formData);
        });
      }

      async function checkAuth() {
        try {
          const r = await fetch("/admin/status");
          const d = await r.json();
          if (!d.isLoggedIn) { globalThis.location.href = "/admin"; return false; }
          return true;
        } catch (e) {
          globalThis.location.href = "/admin";
          return false;
        }
      }

      async function loadPhotos() {
        try {
          const r = await fetch("/admin/photos");
          allPhotos = await r.json();
          renderPicker();
        } catch (e) {
          picker.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem 0;color:#f87171;">Erreur de chargement</div>';
        }
      }

      uploadInput?.addEventListener("change", () => {
        const files = Array.from(uploadInput.files || []);
        uploadList.textContent = files.length ? files.map((f) => f.name).join(", ") : "";
      });

      function renderPicker() {
        normalizeCoverSelection();
        if (allPhotos.length === 0) {
          picker.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem 0;color:var(--text-muted);">Aucune photo disponible</div>';
          return;
        }
        picker.innerHTML = allPhotos.map((p) => {
          const isSel = selectedPhotos.includes(p.filename);
          const isCover = coverFilename === p.filename;
          const orderIdx = selectedPhotos.indexOf(p.filename);
          const thumb = `/photos/resize?file=${encodeURIComponent(p.filename)}&w=240`;
          return `
          <div class="photo-thumb${isSel ? " selected" : ""}${isCover ? " is-cover" : ""}" data-file="${p.filename}">
            <img src="${thumb}" alt="" loading="lazy" />
            ${isSel ? `<span class="badge">${orderIdx + 1}</span>` : ""}
            <span class="cover-star" title="Definir comme couverture">&#9733;</span>
          </div>`;
        }).join("");

        picker.querySelectorAll(".photo-thumb").forEach((el) => {
          const file = el.dataset.file;
          el.addEventListener("click", (e) => {
            if (e.target.closest(".cover-star")) {
              e.stopPropagation();
              if (!selectedPhotos.includes(file)) selectedPhotos.push(file);
              coverFilename = file;
              renderPicker();
              return;
            }
            const idx = selectedPhotos.indexOf(file);
            if (idx === -1) { selectedPhotos.push(file); } else { selectedPhotos.splice(idx, 1); }
            normalizeCoverSelection();
            renderPicker();
          });
        });

        selectedCountEl.textContent = `${selectedPhotos.length} selectionnee(s)`;
      }

      async function loadGalleries() {
        try {
          const r = await fetch("/admin/api/galleries");
          if (!r.ok) throw new Error("fetch");
          const d = await r.json();
          renderGalleries(d.galleries || []);
        } catch (e) {
          listEl.innerHTML = '<div class="empty-state" style="color:#f87171;">Erreur de chargement</div>';
        }
      }

      function renderGalleries(galleries) {
        if (galleries.length === 0) {
          listEl.innerHTML = '<div class="empty-state">Aucune galerie</div>';
          return;
        }
        listEl.innerHTML = galleries.map((g) => {
          const cover = g.cover
            ? `<img src="/photos/resize?file=${encodeURIComponent(g.cover)}&w=240" alt="" />`
            : '<div class="gallery-card-placeholder">--</div>';
          const meta = [g.artist, g.venue, g.date].filter(Boolean).join(" · ");
          return `
          <div class="gallery-card" data-id="${g.id}">
            ${cover}
            <div class="gallery-card-info">
              <div class="gallery-card-title">
                ${escapeHtml(g.title)}
                <span class="gallery-badge ${g.published ? 'published' : 'draft'}">${g.published ? 'publiee' : 'brouillon'}</span>
              </div>
              <div class="gallery-card-meta">${escapeHtml(meta) || "--"}</div>
              <div class="gallery-card-meta">${g.photos.length} photo(s) · /galeries/${g.slug}</div>
            </div>
            <div class="gallery-card-actions">
              <a href="/galeries/${encodeURIComponent(g.slug)}" target="_blank" class="btn btn-ghost">Voir</a>
              <button type="button" class="edit-btn btn btn-primary">Editer</button>
              <button type="button" class="delete-btn btn btn-danger-solid">Supprimer</button>
            </div>
          </div>`;
        }).join("");

        listEl.querySelectorAll(".gallery-card").forEach((card) => {
          const id = card.dataset.id;
          card.querySelector(".edit-btn").addEventListener("click", () => startEdit(id));
          card.querySelector(".delete-btn").addEventListener("click", () => deleteGallery(id));
        });
      }

      function escapeHtml(s) {
        return (s || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
      }

      async function startEdit(id) {
        try {
          const r = await fetch("/admin/api/galleries/" + id);
          const d = await r.json();
          const g = d.gallery;
          editingId = g.id;
          idInput.value = g.id;
          titleInput.value = g.title || "";
          artistInput.value = g.artist || "";
          venueInput.value = g.venue || "";
          dateInput.value = g.date || "";
          descInput.value = g.description || "";
          artistInstagramInput.value = (g.artistLinks && g.artistLinks.instagram) || "";
          artistDeezerInput.value = (g.artistLinks && g.artistLinks.deezer) || "";
          artistSpotifyInput.value = (g.artistLinks && g.artistLinks.spotify) || "";
          pubInput.checked = g.published !== false;
          selectedPhotos = Array.isArray(g.photos) ? g.photos.slice() : [];
          coverFilename = g.cover || selectedPhotos[0] || null;
          normalizeCoverSelection();
          renderPicker();
          formTitle.textContent = "Modifier la galerie";
          submitLabel.textContent = "Enregistrer";
          cancelBtn.classList.remove("hidden");
          globalThis.scrollTo({ top: 0, behavior: "smooth" });
        } catch (e) {
          toast("Erreur de chargement", "error");
        }
      }

      function resetForm() {
        editingId = null;
        form.reset();
        idInput.value = "";
        pubInput.checked = true;
        selectedPhotos = [];
        coverFilename = null;
        if (uploadInput) uploadInput.value = "";
        if (uploadList) uploadList.textContent = "";
        resetUploadProgress();
        renderPicker();
        formTitle.textContent = "Nouvelle galerie";
        submitLabel.textContent = "Creer la galerie";
        cancelBtn.classList.add("hidden");
      }

      async function deleteGallery(id) {
        if (!confirm("Supprimer cette galerie ? (les photos ne seront pas supprimees)")) return;
        try {
          const r = await fetch("/admin/api/galleries/" + id, { method: "DELETE" });
          if (!r.ok) throw new Error("delete");
          toast("Galerie supprimee");
          if (editingId === id) resetForm();
          loadGalleries();
        } catch (e) {
          toast("Erreur de suppression", "error");
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const hasSelected = selectedPhotos.length > 0;
        const hasUploads = uploadInput && uploadInput.files && uploadInput.files.length > 0;
        if (!hasSelected && !hasUploads) {
          toast("Selectionnez au moins une photo", "error");
          return;
        }

        const formData = new FormData(form);
        formData.set("title", (titleInput.value || "").trim());
        formData.set("artist", artistInput.value || "");
        formData.set("venue", venueInput.value || "");
        formData.set("date", dateInput.value || "");
        formData.set("description", descInput.value || "");
        formData.set("artistInstagram", artistInstagramInput.value || "");
        formData.set("artistDeezer", artistDeezerInput.value || "");
        formData.set("artistSpotify", artistSpotifyInput.value || "");
        formData.set("published", pubInput.checked ? "true" : "false");
        formData.set("photos", JSON.stringify(selectedPhotos));
        normalizeCoverSelection();
        formData.set("cover", coverFilename || "");

        try {
          const url = editingId ? "/admin/api/galleries/" + editingId : "/admin/api/galleries";
          const method = editingId ? "PUT" : "POST";
          setSubmittingState(true);

          // Upload new photos one by one first
          const newlyUploadedFilenames = [];
          if (hasUploads) {
            const filesToUpload = Array.from(uploadInput.files);
            const total = filesToUpload.length;
            let uploaded = 0;
            let failed = 0;
            for (const file of filesToUpload) {
              setUploadProgress(
                Math.round((uploaded / total) * 80),
                `Upload ${uploaded + 1}/${total} — ${file.name}`
              );
              try {
                const result = await uploadSinglePhoto(file);
                if (result.files && result.files.length > 0) {
                  const newFilename = result.files[0].filename;
                  newlyUploadedFilenames.push(newFilename);
                  if (!selectedPhotos.includes(newFilename)) {
                    selectedPhotos.push(newFilename);
                  }
                }
                uploaded++;
              } catch (err) {
                failed++;
                console.error(`Echec upload ${file.name}:`, err.message);
              }
            }
            if (failed > 0) {
              toast(`${failed} photo(s) non uploadee(s)`, "error");
            }
            // Update photos list in formData with newly uploaded filenames
            formData.set("photos", JSON.stringify(selectedPhotos));
            normalizeCoverSelection();
            formData.set("cover", coverFilename || "");
            // Remove file inputs so gallery save doesn't re-upload
            formData.delete("uploadedPhotos");
          }
          // Tell the server which photos were just uploaded so it can track them as gallery-only
          if (newlyUploadedFilenames.length > 0) {
            formData.set("galleryOnlyPhotos", JSON.stringify(newlyUploadedFilenames));
          }

          setUploadProgress(85, "Enregistrement de la galerie...");
          await sendFormWithoutFiles(url, method, formData);

          setUploadProgress(100, "Finalisation...");
          toast(editingId ? "Galerie mise a jour" : "Galerie creee");
          await loadPhotos();
          resetForm();
          loadGalleries();
        } catch (err) {
          toast(err.message || "Erreur", "error");
        } finally {
          setSubmittingState(false);
          setTimeout(() => resetUploadProgress(), 800);
        }
      });

      cancelBtn.addEventListener("click", resetForm);

      document.addEventListener("DOMContentLoaded", async () => {
        if (await checkAuth()) {
          await loadPhotos();
          await loadGalleries();
        }
      });
    </script>
  </body>
</html>
