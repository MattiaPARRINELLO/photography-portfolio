<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <title>Textes - Administration</title>
    <link rel="icon" type="image/svg+xml" href="/dist/assets/Logo_MP.svg">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #222;
            --border: #2a2a2a;
            --text: #e5e5e5;
            --text-muted: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #dc2626;
            --radius: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Login */
        .login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        .login-box h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .login-error {
            background: rgba(220,38,38,0.12);
            color: #fca5a5;
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: var(--radius);
            padding: 0.6rem 0.8rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        input[type="password"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus,
        textarea:focus { border-color: var(--accent); }

        ::placeholder { color: #555; }

        textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.6;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.9rem;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            color: #fff;
        }

        .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

        .btn-danger {
            background: transparent;
            color: #f87171;
            border: 1px solid rgba(220,38,38,0.3);
        }
        .btn-danger:hover { background: rgba(220,38,38,0.12); }

        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(15,15,15,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.25rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title { font-size: 0.95rem; font-weight: 600; }
        .header-actions { display: flex; align-items: center; gap: 0.5rem; }

        /* Main */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem 3rem;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .card-title { font-size: 0.95rem; font-weight: 600; }

        /* Text sections */
        .text-section {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .text-section h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .text-section .field-group {
            margin-bottom: 0.75rem;
        }

        .text-section .field-group:last-child { margin-bottom: 0; }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .sub-label {
            display: block;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 0.25rem;
        }

        /* Save indicator */
        .save-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 0.6rem 1rem;
            background: #16a34a;
            color: white;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 1000;
            transform: translateX(calc(100% + 20px));
            transition: transform 0.3s ease;
        }

        .save-indicator.show { transform: translateX(0); }

        @media (max-width: 640px) {
            .field-row { grid-template-columns: 1fr; }
            .header-actions .btn span { display: none; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-container" class="login-wrap">
        <div class="login-box">
            <h1>Editeur de Textes</h1>
            <div id="login-error" class="login-error hidden">Mot de passe incorrect</div>
            <form id="login-form">
                <div style="margin-bottom:1.25rem">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Se connecter</button>
            </form>
        </div>
    </div>

    <!-- Editor panel -->
    <div id="editor-panel" class="hidden">
        <header class="header">
            <div class="header-inner">
                <span class="header-title">Textes</span>
                <div class="header-actions">
                    <a href="/admin" class="btn btn-ghost">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        <span>Retour</span>
                    </a>
                    <button id="logout-btn" class="btn btn-danger">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        <span>Deconnexion</span>
                    </button>
                </div>
            </div>
        </header>

        <div id="save-indicator" class="save-indicator">Sauvegarde !</div>

        <main class="main">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Contenu du site</div>
                    <button id="save-all-btn" class="btn btn-success">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        Sauvegarder
                    </button>
                </div>

                <div id="text-sections">
                    <!-- Informations principales -->
                    <div class="text-section">
                        <h3>Informations Principales</h3>
                        <div class="field-group">
                            <label>Nom Principal</label>
                            <textarea id="main.nom" placeholder="Votre nom complet">Mattia PARRINELLO</textarea>
                        </div>
                    </div>

                    <!-- A Propos -->
                    <div class="text-section">
                        <h3>Section A Propos</h3>
                        <div class="field-row" style="margin-bottom:0.75rem;">
                            <div>
                                <label>Message de Presentation</label>
                                <textarea id="a propos.presentation" placeholder="Ex: Salut, je suis...">Salut, je suis Mattia</textarea>
                            </div>
                            <div>
                                <label>Avatar (chemin de l'image)</label>
                                <textarea id="a propos.avatar" placeholder="/dist/assets/Avatar.png">/dist/assets/Avatar.png</textarea>
                            </div>
                        </div>

                        <label style="margin-bottom:0.5rem;">Biographie (Paragraphes)</label>
                        <div class="field-group">
                            <span class="sub-label">Paragraphe 1</span>
                            <textarea id="a propos.bio.0" style="min-height:100px;" placeholder="Premier paragraphe...">Je suis Mattia, photographe passionne de 18 ans base en region parisienne. Je me specialise dans la photo de rue et le portrait, des domaines qui me permettent de capturer des instants authentiques, des emotions vraies et des histoires uniques a travers mes images. Mon objectif est de creer des photos a la fois esthetiques et porteuses de sens, qui refletent la personnalite et l'energie de chaque sujet.</textarea>
                        </div>
                        <div class="field-group">
                            <span class="sub-label">Paragraphe 2</span>
                            <textarea id="a propos.bio.1" style="min-height:100px;" placeholder="Deuxieme paragraphe...">Depuis mes debuts, j'ai explore differentes approches, experimente avec la lumiere et les couleurs, et cherche a developper une signature visuelle qui me ressemble. Aujourd'hui, je souhaite elargir mon univers vers la photographie de concerts et d'evenements, attire par l'intensite des emotions et l'energie palpable que ces moments degagent.</textarea>
                        </div>
                        <div class="field-group">
                            <span class="sub-label">Paragraphe 3</span>
                            <textarea id="a propos.bio.2" style="min-height:100px;" placeholder="Troisieme paragraphe...">Quand je ne suis pas derriere l'objectif, j'aime arpenter la ville a la recherche de scenes spontanees, explorer de nouvelles perspectives et tester differentes techniques. Je crois que chaque instant peut devenir une image memorable, et j'espere pouvoir partager cette passion et ce regard unique a travers des projets collaboratifs ou personnels.</textarea>
                        </div>
                        <div class="field-group">
                            <span class="sub-label">Paragraphe 4</span>
                            <textarea id="a propos.bio.3" style="min-height:100px;" placeholder="Quatrieme paragraphe...">Merci d'avoir pris le temps de decouvrir mon univers. Si mon travail vous parle, si vous avez un projet ou une idee que vous aimeriez concretiser, je serais ravi d'en discuter. Ensemble, donnons vie a des images qui resteront gravees dans le temps.</textarea>
                        </div>
                    </div>

                    <!-- Meta Tags SEO -->
                    <div class="text-section">
                        <h3>Meta Tags et SEO</h3>
                        <div class="field-group">
                            <label>Titre du site</label>
                            <textarea id="meta.title" placeholder="Titre dans l'onglet du navigateur">Mon Portfolio - Photographe</textarea>
                        </div>
                        <div class="field-group">
                            <label>Description (SEO)</label>
                            <textarea id="meta.description" placeholder="Description pour les moteurs de recherche (150-160 caracteres)">Portfolio photographique professionnel. Decouvrez mes creations artistiques et mes projets photo.</textarea>
                        </div>
                        <div class="field-row" style="margin-bottom:0.75rem;">
                            <div>
                                <label>Mots-cles</label>
                                <textarea id="meta.keywords" placeholder="photographie, portfolio, art, photo">photographie, portfolio, art, photo</textarea>
                            </div>
                            <div>
                                <label>Auteur</label>
                                <textarea id="meta.author" placeholder="Votre nom complet">Votre nom complet</textarea>
                            </div>
                        </div>

                        <div style="padding:0.75rem;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:var(--radius);margin-top:0.5rem;">
                            <p style="font-size:0.8rem;font-weight:600;color:var(--accent);margin-bottom:0.75rem;">Reseaux sociaux (Open Graph)</p>
                            <div class="field-group">
                                <label>Titre pour partage</label>
                                <textarea id="meta.og_title" placeholder="Titre lors du partage">Mon Portfolio Photographique</textarea>
                            </div>
                            <div class="field-group">
                                <label>Description pour partage</label>
                                <textarea id="meta.og_description" placeholder="Description lors du partage">Decouvrez mon univers photographique a travers mes creations artistiques.</textarea>
                            </div>
                            <div class="field-group">
                                <label>Image de partage (URL)</label>
                                <textarea id="meta.og_image" placeholder="URL de l'image">/dist/assets/og-image.jpg</textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="text-section">
                        <h3>Informations de Contact (Footer)</h3>
                        <div class="field-row" style="margin-bottom:0.75rem;">
                            <div>
                                <label>Adresse</label>
                                <textarea id="footer.ligne1" placeholder="Votre adresse">1 rue Victor Basch Franconville 95130</textarea>
                            </div>
                            <div>
                                <label>Telephone</label>
                                <textarea id="footer.ligne2" placeholder="Votre numero">(+33) 6 50 58 62 51</textarea>
                            </div>
                        </div>
                        <div class="field-group">
                            <label>Instagram (nom d'utilisateur)</label>
                            <textarea id="footer.instagram" placeholder="Nom d'utilisateur sans @">mattia_jpeg</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function checkSession() {
            try {
                const response = await fetch('/admin/session-status', { credentials: 'same-origin' });
                const data = await response.json();
                if (data.isLoggedIn) {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('editor-panel').classList.remove('hidden');
                    loadTexts();
                } else {
                    document.getElementById('login-container').classList.remove('hidden');
                    document.getElementById('editor-panel').classList.add('hidden');
                }
            } catch (error) {
                console.error('Erreur verification session:', error);
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('editor-panel').classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', checkSession);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            try {
                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                    credentials: 'same-origin'
                });
                if (response.ok) {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('editor-panel').classList.remove('hidden');
                    loadTexts();
                } else {
                    errorDiv.classList.remove('hidden');
                    setTimeout(() => errorDiv.classList.add('hidden'), 3000);
                }
            } catch (error) {
                console.error('Erreur connexion:', error);
                errorDiv.classList.remove('hidden');
                setTimeout(() => errorDiv.classList.add('hidden'), 3000);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            fetch('/admin/logout', { method: 'POST' }).then(() => {
                document.getElementById('editor-panel').classList.add('hidden');
                document.getElementById('login-container').classList.remove('hidden');
                document.getElementById('password').value = '';
            });
        });

        document.getElementById('save-all-btn').addEventListener('click', async () => {
            const texts = { "main": {}, "meta": {}, "a propos": { "bio": [] }, "footer": {} };
            const textareas = document.querySelectorAll('textarea[id]');
            textareas.forEach(textarea => {
                const id = textarea.id;
                const value = textarea.value;
                if (id === 'main.nom') texts.main.nom = value;
                else if (id === 'a propos.presentation') texts["a propos"].presentation = value;
                else if (id === 'a propos.avatar') texts["a propos"].avatar = value;
                else if (id.startsWith('a propos.bio.')) texts["a propos"].bio[parseInt(id.split('.')[2])] = value;
                else if (id === 'footer.ligne1') texts.footer.ligne1 = value;
                else if (id === 'footer.ligne2') texts.footer.ligne2 = value;
                else if (id === 'footer.instagram') texts.footer.instagram = value;
                else if (id === 'meta.title') texts.meta.title = value;
                else if (id === 'meta.description') texts.meta.description = value;
                else if (id === 'meta.keywords') texts.meta.keywords = value;
                else if (id === 'meta.author') texts.meta.author = value;
                else if (id === 'meta.og_title') texts.meta.og_title = value;
                else if (id === 'meta.og_description') texts.meta.og_description = value;
                else if (id === 'meta.og_image') texts.meta.og_image = value;
            });
            try {
                const response = await fetch('/admin/texts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(texts),
                    credentials: 'same-origin'
                });
                if (response.ok) showSaveIndicator();
                else if (response.status === 401) { alert('Session expiree.'); globalThis.location.reload(); }
                else alert('Erreur lors de la sauvegarde.');
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion au serveur.');
            }
        });

        async function loadTexts() {
            try {
                const response = await fetch('/admin/texts', { credentials: 'same-origin' });
                if (response.ok) {
                    const texts = await response.json();
                    if (texts.main && texts.main.nom) { const el = document.getElementById('main.nom'); if (el) el.value = texts.main.nom; }
                    if (texts["a propos"]) {
                        if (texts["a propos"].presentation) { const el = document.getElementById('a propos.presentation'); if (el) el.value = texts["a propos"].presentation; }
                        if (texts["a propos"].avatar) { const el = document.getElementById('a propos.avatar'); if (el) el.value = texts["a propos"].avatar; }
                        if (texts["a propos"].bio && Array.isArray(texts["a propos"].bio)) {
                            texts["a propos"].bio.forEach((bioText, index) => { const el = document.getElementById(`a propos.bio.${index}`); if (el) el.value = bioText; });
                        }
                    }
                    if (texts.footer) {
                        if (texts.footer.ligne1) { const el = document.getElementById('footer.ligne1'); if (el) el.value = texts.footer.ligne1; }
                        if (texts.footer.ligne2) { const el = document.getElementById('footer.ligne2'); if (el) el.value = texts.footer.ligne2; }
                        if (texts.footer.instagram) { const el = document.getElementById('footer.instagram'); if (el) el.value = texts.footer.instagram; }
                    }
                    if (texts.meta) {
                        ['title', 'description', 'keywords', 'author', 'og_title', 'og_description', 'og_image'].forEach(key => {
                            if (texts.meta[key]) { const el = document.getElementById('meta.' + key); if (el) el.value = texts.meta[key]; }
                        });
                    }
                } else if (response.status === 401) {
                    document.getElementById('editor-panel').classList.add('hidden');
                    document.getElementById('login-container').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Erreur chargement textes:', error);
            }
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('save-indicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 3000);
        }

        let saveTimeout;
        document.addEventListener('input', (e) => {
            if (e.target.tagName === 'TEXTAREA' && e.target.id && e.target.id !== 'password') {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => document.getElementById('save-all-btn').click(), 2000);
            }
        });
    </script>
</body>
</html>
