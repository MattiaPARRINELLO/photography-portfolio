<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>Campagnes - Administration</title>
    <link rel="icon" type="image/svg+xml" href="../../dist/assets/Logo_MP.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface-hover: #222;
        --border: #2a2a2a;
        --text: #e5e5e5;
        --text-muted: #888;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #dc2626;
        --radius: 8px;
      }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
      }

      .hidden { display: none !important; }

      .header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(15,15,15,0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 1.25rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header-title { font-size: 0.95rem; font-weight: 600; }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 0.9rem;
        border: none;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        color: #fff;
      }

      .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

      .btn-primary { background: var(--accent); }
      .btn-primary:hover { background: var(--accent-hover); }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

      .btn-danger-solid { background: var(--danger); }
      .btn-danger-solid:hover { background: #b91c1c; }

      .btn-copy { background: var(--accent); }
      .btn-copy:hover { background: var(--accent-hover); }
      .btn-copy.success { background: #16a34a; }

      .main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem 1.25rem 3rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
      }

      .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; }

      label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      input[type="text"], select, textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 0.85rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
      select option { background: var(--surface); color: var(--text); }
      ::placeholder { color: #555; }

      textarea { resize: vertical; min-height: 60px; }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .form-full { margin-bottom: 0.75rem; }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.6rem;
      }

      .stat-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.8rem;
      }

      .stat-card-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
      .stat-card-value { font-size: 1.25rem; font-weight: 600; }

      .campaign-item {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.9rem;
        margin-bottom: 0.6rem;
        transition: border-color 0.15s;
      }

      .campaign-item:hover { border-color: #444; }

      .campaign-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      .campaign-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }

      .campaign-badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(59,130,246,0.15);
        color: #60a5fa;
        margin-left: 0.4rem;
      }

      .campaign-link {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .campaign-link code {
        background: rgba(0,0,0,0.3);
        padding: 2px 6px;
        border-radius: 4px;
        color: #60a5fa;
        font-size: 0.78rem;
      }

      .campaign-meta {
        font-size: 0.75rem;
        color: #666;
        display: flex;
        gap: 1rem;
      }

      .campaign-actions {
        display: flex;
        gap: 0.4rem;
        flex-shrink: 0;
      }

      .empty-state {
        text-align: center;
        padding: 2rem 0;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .loading-text {
        text-align: center;
        padding: 2rem 0;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid #333;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 0.5rem;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 640px) {
        .form-grid { grid-template-columns: 1fr; }
        .campaign-row { flex-direction: column; }
        .campaign-meta { flex-direction: column; gap: 0.25rem; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <span class="header-title">Campagnes</span>
        <a href="/admin" class="btn btn-ghost">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          <span>Retour</span>
        </a>
      </div>
    </header>

    <main class="main">
      <!-- Create form -->
      <div class="card">
        <div class="card-title">Nouvelle campagne</div>
        <form id="campaign-form">
          <div class="form-grid">
            <div>
              <label for="campaign-name">Nom de la campagne</label>
              <input type="text" id="campaign-name" placeholder="Instagram Story Decembre 2024" required />
            </div>
            <div>
              <label for="campaign-source">Source</label>
              <select id="campaign-source" required>
                <option value="">Choisir une source...</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="twitter">Twitter</option>
                <option value="linkedin">LinkedIn</option>
                <option value="tiktok">TikTok</option>
                <option value="youtube">YouTube</option>
                <option value="email">Email</option>
                <option value="sms">SMS</option>
                <option value="qr-code">QR Code</option>
                <option value="business-card">Carte de visite</option>
                <option value="flyer">Flyer/Brochure</option>
                <option value="word-of-mouth">Bouche a oreille</option>
                <option value="other">Autre</option>
              </select>
            </div>
          </div>
          <div class="form-full">
            <label for="campaign-medium">Medium (optionnel)</label>
            <input type="text" id="campaign-medium" placeholder="story, post, ad, bio, etc." />
          </div>
          <div class="form-full">
            <label for="campaign-description">Description (optionnel)</label>
            <textarea id="campaign-description" placeholder="Description de la campagne..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Generer le lien</button>
        </form>
      </div>

      <!-- Stats -->
      <div class="card">
        <div class="card-title">Statistiques</div>
        <div class="stats-grid" id="campaign-stats">
          <div class="stat-card">
            <div class="stat-card-label">Total Campagnes</div>
            <div class="stat-card-value" id="total-campaigns">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Total Visites</div>
            <div class="stat-card-value" id="total-visits">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Aujourd'hui</div>
            <div class="stat-card-value" id="today-visits">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Top Source</div>
            <div class="stat-card-value" id="top-source">-</div>
          </div>
        </div>
      </div>

      <!-- Campaign list -->
      <div class="card">
        <div class="card-title">Campagnes actives</div>
        <div id="campaigns-container">
          <div class="empty-state">Aucune campagne creee</div>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden">
        <div class="loading-text"><span class="spinner"></span> Chargement...</div>
      </div>
    </main>

    <script>
      let campaigns = [];
      const campaignForm = document.getElementById("campaign-form");
      const campaignsContainer = document.getElementById("campaigns-container");
      const loading = document.getElementById("loading");
      const totalCampaigns = document.getElementById("total-campaigns");
      const totalVisits = document.getElementById("total-visits");
      const todayVisits = document.getElementById("today-visits");
      const topSource = document.getElementById("top-source");

      async function checkAuth() {
        try {
          const response = await fetch("/admin/status");
          if (!response.ok) { window.location.href = "/admin"; return false; }
          return true;
        } catch (error) {
          console.error("Erreur auth:", error);
          window.location.href = "/admin";
          return false;
        }
      }

      function generateCampaignId() {
        const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
        let result = "";
        for (let i = 0; i < 8; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
        return result;
      }

      async function createCampaign(campaignData) {
        const response = await fetch("/admin/api/campaigns", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(campaignData),
        });
        if (!response.ok) throw new Error("Erreur lors de la creation");
        return await response.json();
      }

      async function loadCampaigns() {
        try {
          loading.classList.remove("hidden");
          const response = await fetch("/admin/api/campaigns");
          if (!response.ok) throw new Error("Erreur de chargement");
          const data = await response.json();
          campaigns = data.campaigns || [];
          displayCampaigns();
          updateStats(data.stats || {});
        } catch (error) {
          console.error("Erreur:", error);
          campaignsContainer.innerHTML = '<div class="empty-state" style="color:#f87171;">Erreur de chargement</div>';
        } finally {
          loading.classList.add("hidden");
        }
      }

      function displayCampaigns() {
        if (campaigns.length === 0) {
          campaignsContainer.innerHTML = '<div class="empty-state">Aucune campagne creee</div>';
          return;
        }
        campaignsContainer.innerHTML = campaigns.map((campaign) => `
          <div class="campaign-item">
            <div class="campaign-row">
              <div style="flex:1;min-width:0;">
                <div class="campaign-name">
                  ${campaign.name}
                  <span class="campaign-badge">${campaign.source}</span>
                  ${campaign.medium ? `<span class="campaign-badge" style="background:rgba(255,255,255,0.08);color:var(--text-muted);">${campaign.medium}</span>` : ""}
                </div>
                <div class="campaign-link">Lien: <code>${globalThis.location.origin}/?ref=${campaign.id}</code></div>
                ${campaign.description ? `<p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.35rem;">${campaign.description}</p>` : ""}
                <div class="campaign-meta">
                  <span>Cree le ${new Date(campaign.createdAt).toLocaleDateString("fr-FR")}</span>
                  <span>${campaign.visits || 0} visite(s)</span>
                  <span>Derniere: ${campaign.lastVisit ? new Date(campaign.lastVisit).toLocaleDateString("fr-FR") : "Jamais"}</span>
                </div>
              </div>
              <div class="campaign-actions">
                <button onclick="copyLink('${campaign.id}')" class="btn btn-copy" data-id="${campaign.id}">Copier</button>
                <button onclick="deleteCampaign('${campaign.id}')" class="btn btn-danger-solid">Supprimer</button>
              </div>
            </div>
          </div>
        `).join("");
      }

      function updateStats(stats) {
        totalCampaigns.textContent = stats.totalCampaigns || 0;
        totalVisits.textContent = stats.totalVisits || 0;
        todayVisits.textContent = stats.todayVisits || 0;
        topSource.textContent = stats.topSource || "-";
      }

      function copyLink(campaignId) {
        const link = `${globalThis.location.origin}/?ref=${campaignId}`;
        const btn = document.querySelector(`button[data-id="${campaignId}"]`);
        if (navigator.clipboard && globalThis.isSecureContext) {
          navigator.clipboard.writeText(link).then(() => showCopySuccess(btn)).catch(() => fallbackCopy(link, btn));
        } else {
          fallbackCopy(link, btn);
        }
      }

      function fallbackCopy(text, button) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.select();
        try {
          if (document.execCommand("copy")) showCopySuccess(button);
          else prompt("Copiez ce lien:", text);
        } catch (err) {
          prompt("Copiez ce lien:", text);
        } finally {
          textArea.remove();
        }
      }

      function showCopySuccess(button) {
        if (!button) return;
        const original = button.textContent;
        button.textContent = "Copie !";
        button.classList.add("success");
        setTimeout(() => { button.textContent = original; button.classList.remove("success"); }, 2000);
      }

      async function deleteCampaign(campaignId) {
        if (!confirm("Supprimer cette campagne ?")) return;
        try {
          const response = await fetch(`/admin/api/campaigns/${campaignId}`, { method: "DELETE" });
          if (!response.ok) throw new Error("Erreur");
          await loadCampaigns();
        } catch (error) {
          alert("Erreur lors de la suppression");
        }
      }

      campaignForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const campaignData = {
          id: generateCampaignId(),
          name: document.getElementById("campaign-name").value.trim(),
          source: document.getElementById("campaign-source").value,
          medium: document.getElementById("campaign-medium").value.trim() || null,
          description: document.getElementById("campaign-description").value.trim() || null,
        };
        try {
          const submitBtn = e.target.querySelector('button[type="submit"]');
          submitBtn.textContent = "Creation...";
          submitBtn.disabled = true;
          await createCampaign(campaignData);
          e.target.reset();
          await loadCampaigns();
          submitBtn.textContent = "Cree !";
          setTimeout(() => { submitBtn.textContent = "Generer le lien"; submitBtn.disabled = false; }, 2000);
        } catch (error) {
          console.error("Erreur:", error);
          alert("Erreur lors de la creation");
          const submitBtn = e.target.querySelector('button[type="submit"]');
          submitBtn.textContent = "Generer le lien";
          submitBtn.disabled = false;
        }
      });

      globalThis.copyLink = copyLink;
      globalThis.deleteCampaign = deleteCampaign;

      document.addEventListener("DOMContentLoaded", async () => {
        if (await checkAuth()) await loadCampaigns();
      });
    </script>
  </body>
</html>
